{% extends "layout.html" %}
{% block content %}

<h3>Assign Enquiry</h3>

<p><strong>Company:</strong> {{ enquiry.company }}</p>
<p><strong>Name:</strong> {{ enquiry.name }}</p>

<p>
    <strong>Current Assigned To:</strong>
    {% if enquiry.assigned_to %}
        <span class="badge bg-success">
            {{ enquiry.sales_name if enquiry.sales_name else "Assigned" }}
        </span>
    {% else %}
        <span class="badge bg-secondary">Unassigned</span>
    {% endif %}
</p>

<form method="POST">
    <label>Select Salesperson:</label>
    <select name="sales_id" class="form-select">
        {% for s in sales_users %}
            <option value="{{ s.id }}"
                {% if enquiry.assigned_to == s.id %}selected{% endif %}>
                {{ s.name }}
            </option>
        {% endfor %}
    </select>

    <button class="btn btn-primary mt-3">Save Assignment</button>
</form>

{% endblock %}
