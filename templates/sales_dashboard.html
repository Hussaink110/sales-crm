{% extends "layout.html" %}
{% block content %}

<h3 class="mb-3">My Assigned Enquiries</h3>

<div class="card shadow">
    <div class="card-body">
        <table class="table table-hover table-bordered">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Status</th>
                    <th>Update</th>
                </tr>
            </thead>
            <tbody>
                {% for e in enquiries %}
                <tr>
    <td>{{ e.name }}</td>
    <td>{{ e.phone }}</td>
    <td><span class="badge bg-info">{{ e.status }}</span></td>
    <td>
        <a href="/sales/view/{{ e.id }}" class="btn btn-sm btn-info">View</a>
        <a href="/sales/update/{{ e.id }}" class="btn btn-sm btn-warning">Update</a>
    </td>
</tr>

                {% endfor %}
            </tbody>
        </table>
    </div>
    
</div>

{% endblock %}
